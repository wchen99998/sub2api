apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "sub2api.bootstrapJobName" . }}
  labels:
    {{- include "sub2api.labels" . | nindent 4 }}
    app.kubernetes.io/component: bootstrap
spec:
  backoffLimit: {{ .Values.bootstrap.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.bootstrap.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "sub2api.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: bootstrap
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "sub2api.serviceAccountName" . }}
      securityContext:
        fsGroup: 1000
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/sub2api-bootstrap"]
          envFrom:
            - configMapRef:
                name: {{ include "sub2api.fullname" . }}
            - secretRef:
                name: {{ include "sub2api.secretName" . }}
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
