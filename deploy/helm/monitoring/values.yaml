## Namespace for monitoring stack
namespace: monitoring

## kube-prometheus-stack (Prometheus + Grafana + Alertmanager)
kube-prometheus-stack:
  enabled: true
  prometheus:
    prometheusSpec:
      enableRemoteWriteReceiver: true
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi
      serviceMonitorSelectorNilUsesHelmValues: false
  grafana:
    enabled: true
    adminPassword: ""  # Set via --set kube-prometheus-stack.grafana.adminPassword=xxx
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
      datasources:
        enabled: true
        label: grafana_datasource
    ingress:
      enabled: false  # Managed by grafanaIngress below, not here
  alertmanager:
    enabled: true

## Grafana Ingress (external access)
## Set host to enable: --set grafanaIngress.host=grafana.<domain_suffix>
grafanaIngress:
  host: ""                    # Empty = ingress disabled
  className: nginx
  clusterIssuer: letsencrypt-prod
  cloudflareProxied: "true"

## Grafana Tempo (distributed tracing)
tempo:
  enabled: true
  tempo:
    metricsGenerator:
      enabled: true
      remoteWriteUrl: "http://monitoring-kube-prometheus-prometheus.monitoring.svc:9090/api/v1/write"
    overrides:
      defaults:
        metrics_generator:
          processors:
            - service-graphs
            - span-metrics
            - local-blocks
    storage:
      trace:
        backend: s3
        s3:
          bucket: ""       # --set tempo.tempo.storage.trace.s3.bucket=sub2api-tempo
          endpoint: ""     # --set tempo.tempo.storage.trace.s3.endpoint=<account_id>.r2.cloudflarestorage.com
          access_key: ""   # --set tempo.tempo.storage.trace.s3.access_key=...
          secret_key: ""   # --set tempo.tempo.storage.trace.s3.secret_key=...
          insecure: false
    retention: 720h

## Grafana Loki (log aggregation)
loki:
  enabled: true
  deploymentMode: SingleBinary
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: s3
      s3:
        endpoint: ""         # --set loki.loki.storage.s3.endpoint=<account_id>.r2.cloudflarestorage.com
        region: auto         # R2 uses "auto" as region
        accessKeyId: ""      # --set loki.loki.storage.s3.accessKeyId=...
        secretAccessKey: ""  # --set loki.loki.storage.s3.secretAccessKey=...
        s3ForcePathStyle: true
      bucketNames:
        chunks: ""           # --set loki.loki.storage.bucketNames.chunks=sub2api-loki
        ruler: ""            # --set loki.loki.storage.bucketNames.ruler=sub2api-loki
        admin: ""            # --set loki.loki.storage.bucketNames.admin=sub2api-loki
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    limits_config:
      retention_period: 720h
  chunksCache:
    allocatedMemory: 512
  resultsCache:
    allocatedMemory: 256
  singleBinary:
    replicas: 1
    persistence:
      size: 10Gi

## Grafana Alloy (unified collection agent)
alloy:
  enabled: true
  alloy:
    configMap:
      create: false
      name: alloy-config
      key: config.alloy
    extraPorts:
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
        protocol: TCP
