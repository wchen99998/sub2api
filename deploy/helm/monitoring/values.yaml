## Namespace for monitoring stack
namespace: monitoring

## kube-prometheus-stack (Prometheus + Grafana + Alertmanager)
kube-prometheus-stack:
  enabled: true
  prometheus:
    prometheusSpec:
      enableRemoteWriteReceiver: true
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi
      serviceMonitorSelectorNilUsesHelmValues: false
  grafana:
    enabled: true
    adminPassword: ""  # Set via --set kube-prometheus-stack.grafana.adminPassword=xxx
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
      datasources:
        enabled: true
        label: grafana_datasource
    ingress:
      enabled: false  # Enable via --set, see below
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
      # Deploy with:
      #   --set kube-prometheus-stack.grafana.ingress.enabled=true
      #   --set kube-prometheus-stack.grafana.ingress.hosts[0]=grafana.<domain_suffix>
      #   --set 'kube-prometheus-stack.grafana.ingress.annotations.external-dns\.alpha\.kubernetes\.io/hostname=grafana.<domain_suffix>'
      #   --set kube-prometheus-stack.grafana.ingress.tls[0].secretName=grafana-tls
      #   --set kube-prometheus-stack.grafana.ingress.tls[0].hosts[0]=grafana.<domain_suffix>
      hosts: []
      tls: []
  alertmanager:
    enabled: true

## Grafana Tempo (distributed tracing)
tempo:
  enabled: true
  tempo:
    storage:
      trace:
        backend: s3
        s3:
          bucket: ""       # --set tempo.tempo.storage.trace.s3.bucket=sub2api-tempo
          endpoint: ""     # --set tempo.tempo.storage.trace.s3.endpoint=<account_id>.r2.cloudflarestorage.com
          access_key: ""   # --set tempo.tempo.storage.trace.s3.access_key=...
          secret_key: ""   # --set tempo.tempo.storage.trace.s3.secret_key=...
          insecure: false
    retention: 720h

## Grafana Loki (log aggregation)
loki:
  enabled: true
  deploymentMode: SingleBinary
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: s3
      s3:
        endpoint: ""         # --set loki.loki.storage.s3.endpoint=<account_id>.r2.cloudflarestorage.com
        region: auto         # R2 uses "auto" as region
        accessKeyId: ""      # --set loki.loki.storage.s3.accessKeyId=...
        secretAccessKey: ""  # --set loki.loki.storage.s3.secretAccessKey=...
        s3ForcePathStyle: true
      bucketNames:
        chunks: ""           # --set loki.loki.storage.bucketNames.chunks=sub2api-loki
        ruler: ""            # --set loki.loki.storage.bucketNames.ruler=sub2api-loki
        admin: ""            # --set loki.loki.storage.bucketNames.admin=sub2api-loki
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    limits_config:
      retention_period: 720h
  chunksCache:
    allocatedMemory: 512
  resultsCache:
    allocatedMemory: 256
  singleBinary:
    replicas: 1
    persistence:
      size: 10Gi

## Grafana Alloy (unified collection agent)
alloy:
  enabled: true
  alloy:
    configMap:
      create: false
      name: alloy-config
      key: config.alloy
    extraPorts:
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
        protocol: TCP
